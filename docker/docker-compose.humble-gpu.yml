services:
  lerobot:
    build:
      args:
        BASE_IMAGE: ros:humble-ros-base-jammy
        ENABLE_ROS2_HUMBLE: "1"
    image: ${IMAGE_NAME:-ghcr.io/seanchangx/seeed-studio_so-arm101}:${IMAGE_TAG:-humble-gpu}
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      ROS_DISTRO: humble
    gpus: all
